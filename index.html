<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Controle suas finanças com simplicidade">
  <meta name="theme-color" content="#667eea">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23667eea' width='180' height='180'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='90' fill='white'>💰</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23667eea' width='180' height='180'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='90' fill='white'>💰</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <title>FinançasPro MVP</title>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>💰 FinançasPro</h1>
  <div class="saldo-header">
    <span id="saldo-header-txt">Saldo: R$ 0,00</span>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- ABA 1: RESUMO (Dashboard) -->
  <div id="aba-resumo" class="aba ativo">
    <section class="cards-container">
      <div class="card receita">
        <div class="card-label">💚 Receitas (mês)</div>
        <div class="card-valor" id="resumo-receitas">R$ 0,00</div>
      </div>
      <div class="card despesa">
        <div class="card-label">❤️ Despesas (mês)</div>
        <div class="card-valor" id="resumo-despesas">R$ 0,00</div>
      </div>
    </section>

    <button class="btn-primario" onclick="mudarAba('novo')">
      ➕ Registrar Transação
    </button>

    <section class="orcamento-section" style="margin-top: 30px;">
      <h2 class="secao-titulo">Gastos por Categoria</h2>
      <div id="resumo-orcamentos"></div>
    </section>
  </div>

  <!-- ABA 2: NOVO LANÇAMENTO -->
  <div id="aba-novo" class="aba">
    <form id="form-transacao" class="formulario">
      <fieldset>
        <legend>Tipo de Transação</legend>
        <div class="tipo-selector">
          <button type="button" class="tipo-btn receita ativo" data-tipo="receita" onclick="selecionarTipo('receita')">
            💚 Receita
          </button>
          <button type="button" class="tipo-btn despesa" data-tipo="despesa" onclick="selecionarTipo('despesa')">
            ❤️ Despesa
          </button>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="novo-descricao">O quê? *</label>
        <input type="text" id="novo-descricao" placeholder="Ex: Salário, Café, Aluguel..." required>
      </div>

      <div class="form-group">
        <label for="novo-valor">Valor *</label>
        <input type="number" id="novo-valor" placeholder="0,00" step="0.01" min="0" required>
      </div>

      <div class="form-group">
        <label for="novo-data">Data *</label>
        <input type="date" id="novo-data" required>
      </div>

      <div class="form-group">
        <label for="novo-categoria">Categoria *</label>
        <select id="novo-categoria" required>
          <option value="">Selecione...</option>
          <option value="alimentacao">🍔 Alimentação</option>
          <option value="transporte">🚗 Transporte</option>
          <option value="moradia">🏠 Moradia</option>
          <option value="saude">⚕️ Saúde</option>
          <option value="lazer">🎬 Lazer</option>
          <option value="outro">📌 Outro</option>
        </select>
      </div>

      <div class="form-group">
        <label for="novo-nota">Observação (opcional)</label>
        <textarea id="novo-nota" placeholder="Adicione uma nota..."></textarea>
      </div>

      <button type="submit" class="btn-primario">✅ Registrar</button>
    </form>
  </div>

  <!-- ABA 3: EXTRATO -->
  <div id="aba-extrato" class="aba">
    <div class="filtros-container">
      <button class="filtro-btn ativo" data-filtro="todos" onclick="filtrarExtrato('todos')">📋 Todas</button>
      <button class="filtro-btn" data-filtro="receita" onclick="filtrarExtrato('receita')">💚 Receitas</button>
      <button class="filtro-btn" data-filtro="despesa" onclick="filtrarExtrato('despesa')">❤️ Despesas</button>
    </div>
    <div id="lista-transacoes"></div>
  </div>

  <!-- ABA 4: ORÇAMENTO -->
  <div id="aba-orcamento" class="aba">
    <section class="config-section">
      <h2 class="secao-titulo">Limites por Categoria</h2>
      <form id="form-orcamentos">
        <div class="form-group">
          <label for="limit-alimentacao">Alimentação</label>
          <input type="number" id="limit-alimentacao" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label for="limit-transporte">Transporte</label>
          <input type="number" id="limit-transporte" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label for="limit-moradia">Moradia</label>
          <input type="number" id="limit-moradia" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label for="limit-saude">Saúde</label>
          <input type="number" id="limit-saude" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label for="limit-lazer">Lazer</label>
          <input type="number" id="limit-lazer" placeholder="0,00" step="0.01" min="0">
        </div>
        <button type="submit" class="btn-primario">💾 Salvar Limites</button>
      </form>
    </section>
  </div>

  <!-- ABA 5: CONFIGURAÇÕES -->
  <div id="aba-config" class="aba">
    <section class="config-section">
      <h2 class="secao-titulo">👤 Perfil</h2>
      <form id="form-config">
        <div class="form-group">
          <label for="cfg-nome">Nome</label>
          <input type="text" id="cfg-nome" placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label for="cfg-renda">Renda Mensal</label>
          <input type="number" id="cfg-renda" placeholder="0,00" step="0.01" min="0">
        </div>
        <button type="submit" class="btn-primario">💾 Salvar</button>
      </form>
    </section>

    <section class="config-section">
      <h2 class="secao-titulo">📥 Exportar Dados</h2>
      <p style="color: #666; font-size: 13px; margin-bottom: 12px;">
        Baixe um backup de todos seus dados em JSON
      </p>
      <button class="btn-secundario" onclick="exportarDados()">📥 Exportar JSON</button>
    </section>

    <section class="config-section">
      <h2 class="secao-titulo">⚙️ Sistema</h2>
      <p style="color: #666; font-size: 13px;">
        Versão: <strong>v1.0 MVP</strong><br>
        Dados salvos: <strong>Localmente</strong>
      </p>
    </section>
  </div>

</main>

<!-- NAV INFERIOR -->
<nav class="nav-bottom">
  <button class="nav-btn ativo" data-aba="resumo" onclick="mudarAba('resumo')">
    <span class="nav-emoji">📊</span>
    <span>Resumo</span>
  </button>
  <button class="nav-btn" data-aba="novo" onclick="mudarAba('novo')">
    <span class="nav-emoji">💸</span>
    <span>Novo</span>
  </button>
  <button class="nav-btn" data-aba="extrato" onclick="mudarAba('extrato')">
    <span class="nav-emoji">📋</span>
    <span>Extrato</span>
  </button>
  <button class="nav-btn" data-aba="orcamento" onclick="mudarAba('orcamento')">
    <span class="nav-emoji">📊</span>
    <span>Orçamento</span>
  </button>
  <button class="nav-btn" data-aba="config" onclick="mudarAba('config')">
    <span class="nav-emoji">⚙️</span>
    <span>Config</span>
  </button>
</nav>

<!-- SCRIPTS - ORDEM IMPORTA! -->
<script src="js/config.js"></script>
<script src="js/dados.js"></script>
<script src="js/utils.js"></script>
<script src="js/transacoes.js"></script>
<script src="js/orcamento.js"></script>
<script src="js/render.js"></script>
<script src="js/config-user.js"></script>
<script src="js/init.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>

</body>
</html>
