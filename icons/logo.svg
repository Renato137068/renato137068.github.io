<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="20" y1="32" x2="32" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#bg-grad)"/>
  <!-- Dollar sign -->
  <text x="16" y="35" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="white" opacity=".95">$</text>
  <!-- Upward arrow (growth) -->
  <path d="M28 34 L28 20 L23 25" stroke="url(#arrow-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M28 20 L33 25" stroke="url(#arrow-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small sparkle dot -->
  <circle cx="36" cy="15" r="2" fill="#bbf7d0" opacity=".8"/>
</svg>
